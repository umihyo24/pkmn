<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Myth Meadow MVP</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game-root">
      <canvas id="game-canvas" width="640" height="448" aria-label="ゲームフィールド"></canvas>

      <section id="start-screen" class="overlay active">
        <h1>Myth Meadow</h1>
        <p>草原を探索し、3回勝利しよう！</p>
        <button id="start-btn">Start</button>
      </section>

      <section id="hud" class="panel hidden" aria-live="polite">
        <div>HP: <span id="hud-hp">0</span>/<span id="hud-max-hp">0</span></div>
        <div>Wins: <span id="hud-wins">0</span>/3</div>
      </section>

      <section id="battle-panel" class="overlay hidden" aria-live="polite">
        <div class="battle-card">
          <h2>Encounter!</h2>
          <div class="stats-row">
            <div>
              <h3>Enemy: <span id="enemy-name">-</span></h3>
              <p>HP: <span id="enemy-hp">0</span>/<span id="enemy-max-hp">0</span></p>
            </div>
            <div>
              <h3>Player</h3>
              <p>HP: <span id="player-hp">0</span>/<span id="player-max-hp">0</span></p>
            </div>
          </div>
          <div class="actions">
            <button id="fight-btn">Fight</button>
            <button id="run-btn">Run</button>
          </div>
          <div id="battle-log" class="log"></div>
        </div>
      </section>

      <section id="end-screen" class="overlay hidden">
        <h2 id="end-title">Game Over</h2>
        <p id="end-message"></p>
        <button id="restart-btn">Restart</button>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
